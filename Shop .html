<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Vibe Artificial Jewelry</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .gold { color: #d4af37; }
  </style>
</head>
<body class="bg-gray-50">

  <nav class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <img src="YOUR_LOGO_URL_HERE" alt="Vibe" class="h-14">
        <h1 class="text-3xl font-bold gold">VIBE</h1>
      </div>
      <a href="cart.html" class="text-2xl">🛒</a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-12">
    <h1 class="text-4xl font-light text-center mb-12 gold">All Products</h1>
    <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8"></div>
  </div>

  <script>
    const products = [
      {id:1, name:"Rose Gold Hoops", price:899, img:"https://source.unsplash.com/random/600x600/?earrings"},
      {id:2, name:"Pearl Necklace", price:1499, img:"https://source.unsplash.com/random/600x600/?necklace"},
      {id:3, name:"Crystal Bracelet", price:799, img:"https://source.unsplash.com/random/600x600/?bracelet"},
      {id:4, name:"Kundan Set", price:2799, img:"https://source.unsplash.com/random/600x600/?bridal-jewelry"}
    ];

    function renderProducts() {
      document.getElementById('product-grid').innerHTML = products.map(p => `
        <div class="bg-white rounded-3xl overflow-hidden shadow hover:shadow-xl transition">
          <img src="${p.img}" class="w-full h-72 object-cover">
          <div class="p-6">
            <h4 class="font-medium">${p.name}</h4>
            <p class="gold text-2xl">₹${p.price}</p>
            <button onclick="buyNow(${p.id})" class="mt-6 w-full py-4 bg-gradient-to-r from-amber-500 to-yellow-600 text-white rounded-2xl font-medium">Buy Now</button>
          </div>
        </div>
      `).join('');
    }

    function buyNow(id) {
      const product = products.find(p => p.id === id);
      alert(`Buy Now clicked for: \( {product.name}\nPrice: ₹ \){product.price}`);
      // You can redirect to checkout here
    }

    renderProducts();
  </script>
</body>
</html>
