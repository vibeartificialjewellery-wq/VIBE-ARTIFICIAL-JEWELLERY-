<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Vibe Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>.gold { color: #d4af37; }</style>
</head>
<body class="bg-gray-50">

  <nav class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between">
      <h1 class="text-3xl font-bold gold">VIBE SETTINGS</h1>
      <a href="admin.html" class="text-xl">Back</a>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto p-8 space-y-12">

    <!-- UPI Global -->
    <div class="bg-white rounded-3xl shadow p-10">
      <h2 class="text-2xl mb-6">Global UPI ID</h2>
      <input id="globalUPI" placeholder="yourname@upi" class="w-full p-5 border rounded-2xl text-lg">
      <button onclick="saveGlobalUPI()" class="mt-6 w-full bg-green-600 text-white py-5 rounded-3xl">Save UPI for All Products</button>
    </div>

    <!-- Order Management -->
    <div class="bg-white rounded-3xl shadow p-10">
      <h2 class="text-2xl mb-8">Order Management</h2>
      <div id="order-management" class="space-y-6"></div>
    </div>
  </div>

  <script>
    function saveGlobalUPI() {
      const upi = document.getElementById('globalUPI').value;
      if (upi) {
        localStorage.setItem('globalUPI', upi);
        alert("Global UPI Saved! It will show in Checkout.");
      }
    }

    // Dummy Orders Management
    let orders = [
      {id: "#VIBE784392", customer: "Rahul", amount: 2398, status: "Processing", delivery: "5 days"},
      {id: "#VIBE784391", customer: "Priya", amount: 899, status: "Shipped", delivery: "3 days"}
    ];

    function renderOrders() {
      const container = document.getElementById('order-management');
      container.innerHTML = orders.map((o, i) => `
        <div class="border rounded-3xl p-6 flex justify-between items-center">
          <div>
            <p class="font-bold">${o.id} - ${o.customer}</p>
            <p class="text-sm text-gray-500">₹${o.amount}</p>
          </div>
          <div class="text-right">
            <select onchange="updateStatus(${i}, this.value)" class="border p-3 rounded-2xl">
              <option value="Processing" ${o.status==='Processing'?'selected':''}>Processing</option>
              <option value="Shipped" ${o.status==='Shipped'?'selected':''}>Shipped</option>
              <option value="Delivered" ${o.status==='Delivered'?'selected':''}>Delivered</option>
            </select>
            <p class="text-sm mt-2">${o.delivery}</p>
          </div>
        </div>
      `).join('');
    }

    function updateStatus(i, status) {
      orders[i].status = status;
      alert(`Order ${orders[i].id} status updated to ${status}`);
    }

    window.onload = () => {
      renderOrders();
      const saved = localStorage.getItem('globalUPI');
      if (saved) document.getElementById('globalUPI').value = saved;
    };
  </script>
</body>
</html>
